name: ci

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static:
    name: static
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Resolve pnpm store path
        run: echo "PNPM_STORE_PATH=$(corepack pnpm store path --silent)" >> "$GITHUB_ENV"

      - uses: actions/cache@v4
        with:
          path: ${{ env.PNPM_STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Check web package boundaries
        run: corepack pnpm check:web-boundaries

      - name: Lint
        run: corepack pnpm lint

      - name: Typecheck
        run: corepack pnpm check-types

  api-unit-tests:
    name: api-unit-tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Resolve pnpm store path
        run: echo "PNPM_STORE_PATH=$(corepack pnpm store path --silent)" >> "$GITHUB_ENV"

      - uses: actions/cache@v4
        with:
          path: ${{ env.PNPM_STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: API unit tests
        run: corepack pnpm --filter @alfred/api test

  api-db-tests:
    name: api-db-tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: alfred_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/alfred_ci
      # Format-valid dummies required by serverEnv(); these focused tests do
      # not connect to Redis or external providers.
      REDIS_URL: redis://localhost:6379
      BETTER_AUTH_SECRET: ci-dummy-better-auth-secret-32chars-min
      BETTER_AUTH_URL: http://localhost:3001
      ALFRED_ALLOWED_EMAIL: ci@example.com
      RESEND_API_KEY: re_ci_dummy
      RESEND_FROM_EMAIL: Alfred <noreply@example.com>
      ANTHROPIC_API_KEY: ci-dummy
      GOOGLE_GENERATIVE_AI_API_KEY: ci-dummy
      GOOGLE_OAUTH_CLIENT_ID: ci-dummy
      GOOGLE_OAUTH_CLIENT_SECRET: ci-dummy
      GOOGLE_OAUTH_REDIRECT_URI: http://localhost:3001/api/integrations/google/callback
      GITHUB_APP_ID: "1"
      GITHUB_APP_SLUG: ci-dummy
      GITHUB_APP_CLIENT_ID: ci-dummy
      GITHUB_APP_CLIENT_SECRET: ci-dummy
      GITHUB_APP_PRIVATE_KEY: ci-dummy
      GITHUB_WEBHOOK_SECRET: ci-dummy
      GITHUB_APP_REDIRECT_URI: http://localhost:3001/api/integrations/github/callback
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Resolve pnpm store path
        run: echo "PNPM_STORE_PATH=$(corepack pnpm store path --silent)" >> "$GITHUB_ENV"

      - uses: actions/cache@v4
        with:
          path: ${{ env.PNPM_STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Apply database migrations
        run: corepack pnpm --filter @alfred/db db:migrate

      - name: API database regression tests
        run: >-
          corepack pnpm --filter @alfred/api exec tsx --test
          test/artifacts/create-artifact-message-fk.test.ts
          test/dispatch/staging.test.ts

  ai-unit-tests:
    name: ai-unit-tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Resolve pnpm store path
        run: echo "PNPM_STORE_PATH=$(corepack pnpm store path --silent)" >> "$GITHUB_ENV"

      - uses: actions/cache@v4
        with:
          path: ${{ env.PNPM_STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: AI unit tests
        run: corepack pnpm --filter @alfred/ai test

  required:
    name: required
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - static
      - api-unit-tests
      - api-db-tests
      - ai-unit-tests
    if: always()
    steps:
      - name: Fail unless all required CI jobs passed
        env:
          STATIC_RESULT: ${{ needs.static.result }}
          API_UNIT_TESTS_RESULT: ${{ needs.api-unit-tests.result }}
          API_DB_TESTS_RESULT: ${{ needs.api-db-tests.result }}
          AI_UNIT_TESTS_RESULT: ${{ needs.ai-unit-tests.result }}
        run: |
          test "$STATIC_RESULT" = "success"
          test "$API_UNIT_TESTS_RESULT" = "success"
          test "$API_DB_TESTS_RESULT" = "success"
          test "$AI_UNIT_TESTS_RESULT" = "success"
