name: ci

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check web package boundaries
        run: pnpm check:web-boundaries

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm check-types

      - name: API unit tests
        run: pnpm --filter @alfred/api test

      - name: AI unit tests
        run: pnpm --filter @alfred/ai test
