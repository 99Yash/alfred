name: ci

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static:
    name: static
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Resolve pnpm store path
        run: echo "PNPM_STORE_PATH=$(corepack pnpm store path --silent)" >> "$GITHUB_ENV"

      - uses: actions/cache@v4
        with:
          path: ${{ env.PNPM_STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Check web package boundaries
        run: corepack pnpm check:web-boundaries

      - name: Lint
        run: corepack pnpm lint

      - name: Typecheck
        run: corepack pnpm check-types

  api-unit-tests:
    name: api-unit-tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Resolve pnpm store path
        run: echo "PNPM_STORE_PATH=$(corepack pnpm store path --silent)" >> "$GITHUB_ENV"

      - uses: actions/cache@v4
        with:
          path: ${{ env.PNPM_STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: API unit tests
        run: corepack pnpm --filter @alfred/api test

  ai-unit-tests:
    name: ai-unit-tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Resolve pnpm store path
        run: echo "PNPM_STORE_PATH=$(corepack pnpm store path --silent)" >> "$GITHUB_ENV"

      - uses: actions/cache@v4
        with:
          path: ${{ env.PNPM_STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: AI unit tests
        run: corepack pnpm --filter @alfred/ai test

  required:
    name: required
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - static
      - api-unit-tests
      - ai-unit-tests
    if: always()
    steps:
      - name: Fail unless all required CI jobs passed
        env:
          STATIC_RESULT: ${{ needs.static.result }}
          API_UNIT_TESTS_RESULT: ${{ needs.api-unit-tests.result }}
          AI_UNIT_TESTS_RESULT: ${{ needs.ai-unit-tests.result }}
        run: |
          test "$STATIC_RESULT" = "success"
          test "$API_UNIT_TESTS_RESULT" = "success"
          test "$AI_UNIT_TESTS_RESULT" = "success"
