packages:
  - apps/*
  - packages/*

# Keep pnpm settings here, not in package.json#pnpm. pnpm 11 ignores the
# package.json location, so Corepack/global pnpm must see the same overrides.
overrides:
  "@types/pg": ^8.18.0
  exact-mirror: 1.0.0

# These packages' postinstall scripts were already ignored by pnpm 10 in this
# repo. pnpm 11 makes build-script approval explicit, so keep denying the same
# scripts rather than prompting during frozen installs.
allowBuilds:
  # Needs its postinstall to fetch the platform binary; the server build calls
  # it (scripts/sentry-release.mjs) to upload source maps + associate commits.
  "@sentry/cli": true
  core-js: false
  esbuild: false
  msgpackr-extract: false
  protobufjs: false

catalog:
  "@ai-sdk/anthropic": ^4.0.11
  "@ai-sdk/google": ^4.0.11
  "@ai-sdk/openai": ^4.0.11
  "@ai-sdk/perplexity": ^4.0.8
  # Elysia + its sibling packages are pinned to exact versions, and
  # exact-mirror is pinned via the workspace `overrides` block above.
  # The workspace ships a `normalize: 'typebox'` workaround in
  # packages/api/src/index.ts for an option-name mismatch between
  # elysia@1.4.28 and exact-mirror@1.0.0 (elysia passes `TypeCompiler`,
  # exact-mirror reads `Compile`). Floating these on `^` risks a patch
  # bump that changes the schema-validator wiring and silently breaks
  # the workaround. Bump deliberately, all together.
  "@elysiajs/cors": 1.4.2
  "@elysiajs/eden": 1.4.9
  "@elysiajs/node": 1.4.5
  "@sentry/node": ^10.60.0
  "@sentry/react": ^10.60.0
  "@tailwindcss/postcss": ^4.1.8
  "@tanstack/react-query": ^5.80.2
  "@tanstack/react-router": ^1.121.7
  "@tanstack/router-plugin": ^1.121.7
  "@types/node": ^22.13.11
  "@vitejs/plugin-react": ^4.5.2
  ai: 7.0.19
  # Provider-fallback cascade for the LanguageModel dispatchers (see
  # `withFallback` in packages/ai/src/provider.ts). Same version warden
  # runs on the identical ai@7 / @ai-sdk/provider@4 resolution.
  ai-retry: ^2.0.0
  better-auth: ^1.3.28
  bullmq: ^5.52.1
  clsx: ^2.1.1
  dotenv: ^17.2.2
  elysia: 1.4.28 # exact pin — see @elysiajs/* note above
  ioredis: ^5.6.1
  lucide-react: ^1.24.0
  posthog-js: ^1.372.0
  react: ^19.0.0
  react-dom: ^19.0.0
  # Pinned exact (not ^) — ADR-0061: Replicache is in upstream maintenance mode
  # and we deliberately freeze the version. A caret would silently accept a
  # future 15.x; the whole point of the ADR is that the pin stands.
  replicache: 15.3.0
  resend: ^6.9.3
  sonner: ^2.0.0
  tailwind-merge: ^3.3.0
  tailwindcss: ^4.1.8
  tsdown: ^0.15.5
  typescript: ^7.0.2
  vite: ^6.3.5
  zod: 4.3.6

minimumReleaseAgeExclude:
  - "@ai-sdk/gateway@4.0.15"
  - "@ai-sdk/openai@4.0.11"
  - "@ai-sdk/provider-utils@5.0.7"
  - "@ai-sdk/provider@4.0.3"
  - ai@7.0.19
  - "@ai-sdk/anthropic@4.0.11"
  - "@ai-sdk/google@4.0.11"
  - "@ai-sdk/perplexity@4.0.8"
