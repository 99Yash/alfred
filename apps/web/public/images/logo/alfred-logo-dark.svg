<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Alfred">
  <!--
    Alfred — STANDARD tier mark (dark theme).
    Same single-capsule reading as the light variant, but the squircle runs a
    deeper, calmer violet so it doesn't glare on near-black, and the hairline
    rim is light (not dark) to define the edge against dark surfaces. The inner
    sheen is lifted a touch so the white shell still reads with depth.
  -->
  <defs>
    <linearGradient id="bg" x1="64" y1="32" x2="448" y2="480" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6E5CF0"/>
      <stop offset="0.55" stop-color="#4A35C4"/>
      <stop offset="1" stop-color="#2A1A82"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.34" r="0.68">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="shell" x1="120" y1="100" x2="380" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#EFE6F2"/>
    </linearGradient>
    <linearGradient id="pill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFD3EC"/>
      <stop offset="1" stop-color="#F77FB0"/>
    </linearGradient>
    <clipPath id="squircle">
      <path d="M256 24 C150 24 96 24 60 60 C24 96 24 150 24 256 C24 362 24 416 60 452 C96 488 150 488 256 488 C362 488 416 488 452 452 C488 416 488 362 488 256 C488 150 488 96 452 60 C416 24 362 24 256 24 Z"/>
    </clipPath>
  </defs>

  <g clip-path="url(#squircle)">
    <rect x="0" y="0" width="512" height="512" fill="url(#bg)"/>
    <rect x="0" y="0" width="512" height="512" fill="url(#glow)"/>
  </g>

  <!-- light rim so the squircle holds a crisp edge against dark surfaces -->
  <path d="M256 24 C150 24 96 24 60 60 C24 96 24 150 24 256 C24 362 24 416 60 452 C96 488 150 488 256 488 C362 488 416 488 452 452 C488 416 488 362 488 256 C488 150 488 96 452 60 C416 24 362 24 256 24 Z" fill="none" stroke="#FFFFFF" stroke-opacity="0.16" stroke-width="2"/>

  <g transform="translate(96,96) scale(20)">
    <path fill="url(#shell)" d="M14.9883 5.92857C14.8396 3.57429 13.1304 1.54 10.7329 0.868574L8.39958 0.214286C7.87458 0.0714286 7.34958 0 6.83333 0C3.61625 0 1 2.56286 1 5.71429V10.2857C1 13.4371 3.61625 16 6.83333 16C7.34958 16 7.87457 15.9286 8.39082 15.7886L10.7329 15.1314C13.1304 14.46 14.8396 12.4257 14.9883 10.0714C14.9971 9.95429 15 9.83429 15 9.71429V6.28571C15 6.16571 14.9971 6.04571 14.9883 5.92857ZM13.8333 9.71429C13.8333 9.81143 13.8304 9.90571 13.8246 10C13.705 11.9086 12.2904 13.5057 10.4121 14.0314L8.07874 14.6857C7.68207 14.7943 7.265 14.8571 6.83333 14.8571C4.26083 14.8571 2.16667 12.8057 2.16667 10.2857V5.71429C2.16667 3.19429 4.26083 1.14286 6.83333 1.14286C7.265 1.14286 7.68207 1.20572 8.07874 1.31429L10.4121 1.96858C12.2875 2.49429 13.705 4.09143 13.8246 6C13.8304 6.09429 13.8333 6.19143 13.8333 6.28571V9.71429Z"/>
    <path fill="url(#pill)" d="M6.83333 2.28571C4.89958 2.28571 3.33333 3.82 3.33333 5.71429V10.2857C3.33333 12.18 4.89958 13.7143 6.83333 13.7143C8.76708 13.7143 10.3333 12.18 10.3333 10.2857V5.71429C10.3333 3.82 8.76708 2.28571 6.83333 2.28571Z"/>
  </g>
</svg>
