<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Alfred">
  <!-- Full-bleed variant for apple-touch-icon & maskable PWA icons: the platform
       applies its own corner mask, so the gradient must reach all four edges. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8170F8"/>
      <stop offset="0.55" stop-color="#5B43E0"/>
      <stop offset="1" stop-color="#3A24B0"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.34" r="0.7">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="shell" x1="150" y1="130" x2="372" y2="392" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#EFE6F2"/>
    </linearGradient>
    <linearGradient id="pill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFD3EC"/>
      <stop offset="1" stop-color="#F77FB0"/>
    </linearGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="9" stdDeviation="13" flood-color="#1B0E45" flood-opacity="0.4"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="512" height="512" fill="url(#bg)"/>
  <rect x="0" y="0" width="512" height="512" fill="url(#glow)"/>

