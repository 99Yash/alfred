<!doctype html>
<html lang="en" class="dark" style="color-scheme: dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="color-scheme" content="dark" />
    <link rel="icon" type="image/svg+xml" href="/images/logo/alfred-logo.svg" />
    <title>Alfred</title>
    <!-- Preload Open Runde so the brand font is discovered immediately rather
         than after the JS bundle parses index.css. Both weights render above
         the fold (Medium=body, Semibold=hero heading). crossorigin is required
         even same-origin: fonts are always fetched in CORS mode. -->
    <link
      rel="preload"
      href="/fonts/OpenRunde-Semibold.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="/fonts/OpenRunde-Medium.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <script
      src="https://cdn.visitors.now/v.js"
      data-token="1e8a7887-a321-431e-bae1-c0a037971c85"
      data-persist
    ></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
